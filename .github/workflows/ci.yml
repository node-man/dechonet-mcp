name: CI

# Build + stdio introspection smoke test on every push/PR to master, so the
# default branch carries a visible CI status (build passes, server starts and
# lists its tools). Independent of publish.yml (which runs only on release).
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build

      - name: Smoke test (stdio introspection)
        run: |
          out=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | timeout 20 node build/index.js 2>/dev/null || true)
          echo "$out" | grep -q '"tools"' && echo "smoke OK: server listed tools" || { echo "smoke FAILED"; exit 1; }
